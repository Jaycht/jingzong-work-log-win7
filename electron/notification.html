<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#6366F1;--accent-2:#818CF8;--accent-soft:rgba(99,102,241,.12)}
html,body{width:100%;height:100%;background:#EDEFF3;font-family:"Segoe UI","PingFang SC","Microsoft YaHei UI",system-ui,sans-serif;overflow:hidden;user-select:none}
.notif{position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:16px 18px 14px;border-radius:18px;overflow:hidden;
  background:#FFFFFF;
  border:1px solid rgba(15,23,42,.07);
  box-shadow:0 22px 56px rgba(15,23,42,.22),0 6px 18px rgba(15,23,42,.10),inset 0 1px 0 rgba(255,255,255,.7);
  color:#1F2430;animation:notifIn .4s cubic-bezier(.2,.85,.25,1)}
.notif::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--accent-2),var(--accent))}
@keyframes notifIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}

.top{display:flex;align-items:flex-start;gap:12px;position:relative;z-index:1}
.ico{width:42px;height:42px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,var(--accent-2),var(--accent));color:#fff;
  box-shadow:0 6px 16px var(--accent-soft),inset 0 1px 0 rgba(255,255,255,.35)}
.ico svg{width:21px;height:21px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.titles{flex:1;min-width:0;padding-top:1px}
.title{font-size:14.5px;font-weight:700;line-height:1.3;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:999px;line-height:1.5;white-space:nowrap}
.pill-type{background:rgba(15,23,42,.06);color:rgba(15,23,42,.6)}
.pill-prio{color:#fff}
.pill-date{background:rgba(15,23,42,.04);color:rgba(15,23,42,.42);font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.95);flex-shrink:0}
.x{width:26px;height:26px;border-radius:8px;flex-shrink:0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:rgba(15,23,42,.05);color:rgba(15,23,42,.45);font-size:13px;transition:background .15s,color .15s}
.x:hover{background:rgba(15,23,42,.1);color:rgba(15,23,42,.75)}

.body{position:relative;z-index:1;margin-top:11px;font-size:12.5px;line-height:1.55;color:rgba(15,23,42,.66);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:auto;padding-top:12px;position:relative;z-index:1}
.btn{padding:7px 15px;border-radius:10px;border:1px solid transparent;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;transition:all .16s;white-space:nowrap}
.btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.btn-ghost{background:rgba(15,23,42,.04);border-color:rgba(15,23,42,.07);color:rgba(15,23,42,.62)}
.btn-ghost:hover{background:rgba(15,23,42,.08);color:rgba(15,23,42,.85)}
.btn-solid{background:linear-gradient(150deg,var(--accent-2),var(--accent));color:#fff;border-color:transparent;box-shadow:0 4px 12px var(--accent-soft)}
.btn-solid:hover{filter:brightness(1.05);box-shadow:0 6px 16px var(--accent-soft)}

.countbar{position:absolute;left:4px;right:0;bottom:0;height:3px;background:rgba(15,23,42,.05);overflow:hidden;border-radius:0 0 18px 18px;z-index:2}
.countfill{height:100%;width:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent));border-radius:0 0 0 18px;animation:count 12s linear forwards}
@keyframes count{from{width:100%}to{width:0%}}
</style>
</head>
<body>
<div class="notif" id="notif">
  <div class="top">
    <div class="ico" id="ico">
      <svg viewBox="0 0 24 24"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    </div>
    <div class="titles">
      <div class="title" id="title">提醒</div>
      <div class="meta" id="meta"></div>
    </div>
    <button class="x" id="x" title="关闭">✕</button>
  </div>
  <div class="body" id="body"></div>
  <div class="actions" id="actions"></div>
  <div class="countbar"><div class="countfill" id="countfill"></div></div>
</div>

<script>
const PRIORITY = {
  urgent:  { a:'#EF4444', a2:'#F87171', soft:'rgba(239,68,68,.16)' },
  important:{ a:'#F59E0B', a2:'#FBBF24', soft:'rgba(245,158,11,.16)' },
  normal:  { a:'#6366F1', a2:'#818CF8', soft:'rgba(99,102,241,.14)' },
};
const PRIO_LABEL = { urgent:'紧急', important:'重要', normal:'普通' };

let noteIdGlobal = '';
let audio = null;
let closeTimer = null;

function setAccent(priority){
  const p = PRIORITY[priority] || PRIORITY.normal;
  const root = document.documentElement.style;
  root.setProperty('--accent', p.a);
  root.setProperty('--accent-2', p.a2);
  root.setProperty('--accent-soft', p.soft);
}

function playSound(file){
  if(!file) return;
  try{
    const isDev = location.hostname === 'localhost';
    const basePath = isDev ? '/audio/' : '../dist/audio/';
    audio = new Audio(basePath + file);
    audio.volume = 1.0;
    audio.play().catch(function(){});
  }catch(e){}
}

function closeWindow(){
  if(closeTimer){ clearTimeout(closeTimer); closeTimer = null; }
  if(window.electronAPI) window.electronAPI.closeNotifWindow();
}
function snooze(minutes){ if(window.electronAPI) window.electronAPI.notifSnooze(minutes, noteIdGlobal); }
function dismiss(){ if(window.electronAPI) window.electronAPI.notifDismiss(noteIdGlobal); }

document.getElementById('x').addEventListener('click', closeWindow);

window.addEventListener('DOMContentLoaded', function(){
  const params = new URLSearchParams(window.location.search);
  const title = params.get('title') || '提醒';
  const body = params.get('body') || '';
  const soundFile = params.get('sound') || '';
  const noteId = params.get('noteId') || '';
  const type = params.get('type') || '';
  const priority = params.get('priority') || 'normal';
  const date = params.get('date') || '';
  noteIdGlobal = noteId;

  setAccent(priority);
  document.getElementById('title').textContent = title;
  document.getElementById('body').textContent = body;

  const meta = document.getElementById('meta');
  let html = '';
  if(type) html += '<span class="pill pill-type">'+escapeHtml(type)+'</span>';
  if(priority && priority !== 'normal') html += '<span class="pill pill-prio" style="background:'+PRIORITY[priority].a+'"><span class="dot"></span>'+PRIO_LABEL[priority]+'</span>';
  if(date) html += '<span class="pill pill-date">'+escapeHtml(date)+'</span>';
  meta.innerHTML = html;

  if(soundFile) playSound(soundFile);

  const actions = document.getElementById('actions');
  if(noteId){
    const snoozeBtn = document.createElement('button');
    snoozeBtn.className = 'btn btn-ghost';
    snoozeBtn.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>稍后 5 分钟';
    snoozeBtn.onclick = function(){ snooze(5); };
    actions.appendChild(snoozeBtn);

    const dismissBtn = document.createElement('button');
    dismissBtn.className = 'btn btn-solid';
    dismissBtn.textContent = '不再提醒';
    dismissBtn.onclick = function(){ dismiss(); };
    actions.appendChild(dismissBtn);
  } else {
    const okBtn = document.createElement('button');
    okBtn.className = 'btn btn-solid';
    okBtn.textContent = '我知道了';
    okBtn.onclick = closeWindow;
    actions.appendChild(okBtn);
  }

  closeTimer = setTimeout(closeWindow, 12000);
});

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
</script>
</body></html>
