<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;font-family:'Microsoft YaHei','Segoe UI',sans-serif;overflow:hidden;user-select:none}
.notif{width:380px;padding:18px 20px 14px;border-radius:14px;background:linear-gradient(135deg,#6C5CE7,#A29BFE);color:#fff;box-shadow:0 10px 40px rgba(108,92,231,.5),0 0 0 1px rgba(255,255,255,.1);position:relative;overflow:hidden}
.notif::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.notif::after{content:'';position:absolute;bottom:-30px;left:-30px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05)}
.header{display:flex;align-items:center;gap:8px;margin-bottom:8px;position:relative;z-index:1}
.icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.title{font-size:14px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.close-btn{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.15);font-size:14px;color:rgba(255,255,255,.8);flex-shrink:0;border:none;transition:background .2s}
.close-btn:hover{background:rgba(255,255,255,.3)}
.body{font-size:12.5px;line-height:1.5;opacity:.92;margin-bottom:14px;position:relative;z-index:1;max-height:60px;overflow:hidden;text-overflow:ellipsis}
.actions{display:flex;gap:8px;justify-content:flex-end;position:relative;z-index:1}
.btn{padding:5px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer;font-weight:600;transition:all .2s;font-family:inherit}
.btn:hover{background:rgba(255,255,255,.25)}
.btn-primary{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.5)}
</style>
</head><body>
<div class="notif" id="notif">
  <div class="header">
    <div class="icon" id="icon">🔔</div>
    <div class="title" id="title"></div>
    <button class="close-btn" onclick="closeWindow()">✕</button>
  </div>
  <div class="body" id="body"></div>
  <div class="actions" id="actions"></div>
</div>
<script>
let audio = null;
function playSound(file) {
  if (!file) return;
  try {
    var isDev = location.hostname === 'localhost';
    var basePath = isDev ? '/audio/' : '../dist/audio/';
    audio = new Audio(basePath + file);
    audio.volume = 1.0;
    audio.play().catch(function(){});
  } catch(e) {}
}

function closeWindow() {
  if (window.electronAPI) window.electronAPI.closeNotifWindow();
}

let noteIdGlobal = '';
function snooze(minutes) {
  if (window.electronAPI) window.electronAPI.notifSnooze(minutes, noteIdGlobal);
}

function dismiss() {
  if (window.electronAPI) window.electronAPI.notifDismiss(noteIdGlobal);
}

window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var title = params.get('title') || '提醒';
  var body = params.get('body') || '';
  var soundFile = params.get('sound') || '';
  var noteId = params.get('noteId') || '';
  noteIdGlobal = noteId;

  document.getElementById('title').textContent = title;
  document.getElementById('body').textContent = body;

  if (soundFile) playSound(soundFile);

  var actions = document.getElementById('actions');
  if (noteId) {
    var snoozeBtn = document.createElement('button');
    snoozeBtn.className = 'btn';
    snoozeBtn.textContent = '稍后提醒(5分钟)';
    snoozeBtn.onclick = function() { snooze(5); };
    actions.appendChild(snoozeBtn);

    var dismissBtn = document.createElement('button');
    dismissBtn.className = 'btn btn-primary';
    dismissBtn.textContent = '不再提醒';
    dismissBtn.onclick = function() { dismiss(); };
    actions.appendChild(dismissBtn);
  } else {
    var okBtn = document.createElement('button');
    okBtn.className = 'btn btn-primary';
    okBtn.textContent = '我知道了';
    okBtn.onclick = closeWindow;
    actions.appendChild(okBtn);
  }

  setTimeout(function() { closeWindow(); }, 10000);
});
</script>
</body></html>
