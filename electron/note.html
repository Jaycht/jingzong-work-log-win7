<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#EDEFF3;font-family:"Segoe UI","PingFang SC","Microsoft YaHei UI",system-ui,sans-serif}
:root{
  --radius:0;
  --header-h:46px;
  --ease:cubic-bezier(.2,.8,.2,1);
}
.note-shell{width:100%;height:100%;display:flex;padding:0;filter:drop-shadow(0 18px 50px rgba(15,23,42,.18)) drop-shadow(0 6px 16px rgba(15,23,42,.10));}
.note{width:100%;height:100%;display:flex;flex-direction:column;border-radius:var(--radius);overflow:hidden;position:relative;
  transition:filter .25s var(--ease),transform .18s var(--ease);
  background:#F7F8FA;
  border:1px solid rgba(15,23,42,.10);
}
.note::before{content:"";position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(15,23,42,.08), inset 0 -1px 0 rgba(0,0,0,.04);z-index:5}
.note-shell:hover{filter:drop-shadow(0 22px 60px rgba(15,23,42,.22)) drop-shadow(0 8px 20px rgba(15,23,42,.12));}

.header{height:var(--header-h);min-height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 8px 0 14px;
  position:relative;z-index:10;
  background:linear-gradient(180deg, rgba(15,23,42,.05), rgba(15,23,42,0));
  border-bottom:1px solid rgba(0,0,0,.06)}
.header-left{display:flex;align-items:center;gap:10px;pointer-events:none;min-width:0;flex:1}
.color-indicator{pointer-events:auto;-webkit-app-region:no-drag;width:16px;height:16px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.9);box-shadow:0 1px 5px rgba(0,0,0,.18),inset 0 1px 2px rgba(255,255,255,.5);
  cursor:pointer;flex-shrink:0;transition:transform .15s var(--ease)}
.color-indicator:hover{transform:scale(1.15)}
.type-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3.5px 10px;border-radius:999px;
  background:rgba(15,23,42,.08);color:rgba(15,23,42,.7);pointer-events:none;-webkit-app-region:no-drag;white-space:nowrap;flex-shrink:0;
  letter-spacing:.02em}
.type-tag .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.45)}
.meta-label{font-size:12.5px;font-weight:600;opacity:.85;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;-webkit-app-region:no-drag}
.header-right{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .18s var(--ease);-webkit-app-region:no-drag}
.note:hover .header-right,.note.minimized .header-right{opacity:1}
.hbtn{width:30px;height:30px;border:none;border-radius:9px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:rgba(15,23,42,.55);transition:background .14s,color .14s,transform .12s;transform:translateY(0);-webkit-app-region:no-drag}
.hbtn:hover{background:rgba(15,23,42,.08);color:rgba(15,23,42,.92);transform:translateY(-1px)}
.hbtn:active{transform:translateY(0) scale(.94)}
.hbtn.close:hover{background:rgba(214,40,40,.92);color:#fff}
.hbtn svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}

.body{flex:1;position:relative;overflow:hidden}
.textarea{width:100%;height:100%;border:none;outline:none;resize:none;background:transparent;font-size:14.5px;line-height:1.78;
  padding:14px 18px 16px;font-family:inherit;letter-spacing:.01em;overflow-y:auto;-webkit-app-region:no-drag;color:inherit}
.textarea::placeholder{color:rgba(15,23,42,.3)}
.textarea::-webkit-scrollbar{width:5px}
.textarea::-webkit-scrollbar-thumb{background:rgba(15,23,42,.15);border-radius:3px}
.textarea::-webkit-scrollbar-thumb:hover{background:rgba(15,23,42,.25)}

.statusbar{height:28px;min-height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;
  font-size:10.5px;color:rgba(15,23,42,.45);border-top:1px solid rgba(0,0,0,.06);
  background:linear-gradient(0deg, rgba(15,23,42,.04), rgba(15,23,42,0));user-select:none;-webkit-app-region:no-drag}
.statusbar .save-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(34,160,90,.85);margin-right:5px;vertical-align:middle;
  box-shadow:0 0 0 3px rgba(34,160,90,.16);transition:background .2s}
.statusbar .save-dot.saving{background:rgba(220,150,30,.95);box-shadow:0 0 0 3px rgba(220,150,30,.16)}

.color-picker{position:absolute;top:50px;left:10px;display:none;gap:8px;padding:10px 12px;background:#FFFFFF;
  border-radius:16px;
  box-shadow:0 12px 34px rgba(15,23,42,.18),0 0 0 .5px rgba(15,23,42,.07);z-index:100;animation:popIn .16s var(--ease);-webkit-app-region:no-drag}
.color-picker.show{display:flex}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid rgba(255,255,255,.85);box-shadow:0 1px 5px rgba(0,0,0,.14);transition:transform .12s var(--ease)}
.color-dot:hover{transform:scale(1.14)}
.color-dot.active{border-color:rgba(15,23,42,.35);transform:scale(1.14);box-shadow:0 0 0 2px rgba(255,255,255,.9),0 1px 5px rgba(0,0,0,.18)}

.opacity-bar{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:10px;padding:8px 15px;
  background:#FFFFFF;
  border-radius:14px;box-shadow:0 8px 24px rgba(15,23,42,.16),0 0 0 .5px rgba(15,23,42,.07);z-index:100;animation:popIn .16s var(--ease);-webkit-app-region:no-drag}
.opacity-bar.show{display:flex}
.opacity-bar label{font-size:11px;color:#444;white-space:nowrap;font-weight:500}
.opacity-slider{-webkit-appearance:none;width:96px;height:4px;border-radius:2px;background:rgba(15,23,42,.14);outline:none}
.opacity-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 5px rgba(15,23,42,.3);cursor:pointer;border:1px solid rgba(15,23,42,.08)}

.note.minimized .body,.note.minimized .statusbar{display:none}
.note.minimized .header{border-bottom:none}
.note.minimized{border-radius:0}

.ctx-menu{position:fixed;z-index:1000;min-width:204px;padding:6px;background:#FFFFFF;
  border-radius:14px;box-shadow:0 14px 40px rgba(15,23,42,.20),0 0 0 .5px rgba(15,23,42,.07);animation:popIn .14s var(--ease);font-size:13px;-webkit-app-region:no-drag}
.ctx-item{padding:8px 12px;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:rgba(15,23,42,.84);transition:background .12s}
.ctx-item:hover{background:rgba(15,23,42,.06)}
.ctx-item.danger{color:#c42b1c}
.ctx-item.danger:hover{background:rgba(196,43,28,.09)}
.ctx-divider{height:1px;background:rgba(15,23,42,.08);margin:4px 8px}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>
<body>
<div class="note-shell">
<div class="note" id="note">
  <div class="header" id="header">
    <div class="header-left">
      <div class="color-indicator" id="color-indicator" title="左键切换颜色，右键更多选项"></div>
      <span class="type-tag" id="type-tag"></span>
      <span class="meta-label" id="meta-label"></span>
    </div>
    <div class="header-right">
      <button class="hbtn" id="btn-min" title="折叠/展开 (Ctrl+M)"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
      <button class="hbtn" id="btn-opacity" title="调整透明度"><svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0L12 2.69z"></path></svg></button>
      <button class="hbtn" id="btn-pin" title="置顶切换"><svg viewBox="0 0 24 24"><path d="M16 3v7.17c0 1.1-.68 2.08-1.7 2.47l-1.54.62a2.5 2.5 0 0 1-3.52-3.52l.62-1.54A2.5 2.5 0 0 1 13.83 6H21"></path><line x1="8" y1="13" x2="2" y2="19"></line><line x1="13" y1="11" x2="19" y2="5"></line></svg></button>
      <button class="hbtn close" id="btn-close" title="关闭便签"><svg viewBox="0 0 24 24"><line x1="5" y1="5" x2="19" y2="19"></line><line x1="19" y1="5" x2="5" y2="19"></line></svg></button>
    </div>
  </div>
  <div class="color-picker" id="color-picker"></div>
  <div class="opacity-bar" id="opacity-bar">
    <label>透明度</label>
    <input type="range" class="opacity-slider" id="opacity-slider" min="30" max="100" value="100">
  </div>
  <div class="body">
    <textarea class="textarea" id="textarea" placeholder="输入内容..."></textarea>
  </div>
  <div class="statusbar" id="statusbar">
    <span id="save-state"><span class="save-dot"></span>已保存</span>
    <span id="word-count">0 字</span>
  </div>
</div>
</div>

<script>
const COLORS=[
  {bg:'#FBF3CE',header:'#F4E3A6',text:'#6B5410',dot:'#E9C44A'},
  {bg:'#FCE0E6',header:'#F7CBD6',text:'#7A2740',dot:'#EF9DB1'},
  {bg:'#DCF3E4',header:'#C7EBD2',text:'#1F4A30',dot:'#83D49B'},
  {bg:'#DCEAFB',header:'#C6DBF5',text:'#1C3C5E',dot:'#7FB2EE'},
  {bg:'#ECE2FB',header:'#DCCFF4',text:'#3B2B68',dot:'#B79BF0'},
  {bg:'#FCE7D2',header:'#F6D6B6',text:'#6B3A12',dot:'#F2B079'},
];
let noteData=null;
const api=window.electronAPI;
const PRIORITY_COLORS={normal:'rgba(15,23,42,.35)',important:'#B45309',urgent:'#B91C1C'};

function applyColor(idx){
  const c=COLORS[idx];
  document.getElementById('note').style.background=c.bg;
  document.getElementById('header').style.background='linear-gradient(180deg, '+c.header+', '+shade(c.header,-6)+')';
  document.getElementById('textarea').style.color=c.text;
  document.getElementById('color-indicator').style.background=c.dot;
  document.querySelectorAll('.color-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
function shade(hex,pct){
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+Math.round(255*pct/100)));
  g=Math.max(0,Math.min(255,g+Math.round(255*pct/100)));
  b=Math.max(0,Math.min(255,b+Math.round(255*pct/100)));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function buildColorPicker(){
  const picker=document.getElementById('color-picker');
  picker.innerHTML='';
  COLORS.forEach((c,i)=>{
    const dot=document.createElement('div');
    dot.className='color-dot'+(i===(noteData?.colorIdx||0)?' active':'');
    dot.style.background=c.dot;
    dot.title=['黄色','粉色','绿色','蓝色','紫色','橙色'][i];
    dot.onclick=()=>{noteData.colorIdx=i;applyColor(i);api.noteUpdate(noteData.id,{colorIdx:i});picker.classList.remove('show');};
    picker.appendChild(dot);
  });
}

function applyMinimized(min){
  document.getElementById('note').classList.toggle('minimized',!!min);
  const btn=document.getElementById('btn-min');
  if(min){btn.innerHTML='<svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2"></rect></svg>';btn.title='展开 (Ctrl+M)';}
  else{btn.innerHTML='<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line></svg>';btn.title='折叠 (Ctrl+M)';}
}

function updateHeader(){
  if(!noteData)return;
  const tag=document.getElementById('type-tag');
  const prio=noteData.priority;
  const showPrio=prio==='important'||prio==='urgent';
  tag.style.display=(noteData.type||showPrio)?'inline-flex':'none';
  tag.innerHTML=(showPrio?`<span class="dot" style="background:${PRIORITY_COLORS[prio]}"></span>`:'')+(noteData.type?noteData.type:'');
  const title=noteData.title||'';
  const text=noteData.text||'';
  const summary=text.replace(/<[^>]+>/g,'').substring(0,24);
  const datePart=noteData.date?noteData.date+'  ':'';
  document.getElementById('meta-label').textContent=title||(datePart+summary)||'便签';
  updateWordCount(text);
}
function updateWordCount(text){
  const len=(text||'').replace(/\s/g,'').length;
  document.getElementById('word-count').textContent=len+' 字';
}

function closeAllPopups(){
  document.getElementById('color-picker').classList.remove('show');
  document.getElementById('opacity-bar').classList.remove('show');
  const old=document.getElementById('ctx-menu');if(old)old.remove();
}

function showContextMenu(x,y){
  if(!noteData)return;
  closeAllPopups();
  const isTop=noteData.alwaysOnTop!==false;
  const items=[
    {label:'新建便签',action:()=>api.createNoteWindow({})},
    {divider:true},
    {label:noteData.minimized?'展开便签':'折叠便签',action:()=>api.noteMinimize(noteData.id)},
    {label:isTop?'取消置顶':'置顶显示',action:()=>{noteData.alwaysOnTop=!isTop;api.noteUpdate(noteData.id,{alwaysOnTop:noteData.alwaysOnTop});}},
    {label:'调整透明度',action:()=>{document.getElementById('opacity-bar').classList.toggle('show');}},
    {label:'切换颜色',action:()=>{document.getElementById('color-picker').classList.toggle('show');}},
    {divider:true},
    {label:'删除便签',danger:true,action:()=>api.noteClose(noteData.id)},
  ];
  const menu=document.createElement('div');
  menu.id='ctx-menu';
  menu.className='ctx-menu';
  menu.style.cssText='left:'+x+'px;top:'+y+'px';
  for(const item of items){
    if(item.divider){const d=document.createElement('div');d.className='ctx-divider';menu.appendChild(d);continue;}
    const row=document.createElement('div');
    row.className='ctx-item'+(item.danger?' danger':'');
    row.textContent=item.label;
    row.onclick=()=>{closeAllPopups();item.action();};
    menu.appendChild(row);
  }
  document.body.appendChild(menu);
  const r=menu.getBoundingClientRect();
  if(r.right>window.innerWidth)menu.style.left=(window.innerWidth-r.width-4)+'px';
  if(r.bottom>window.innerHeight)menu.style.top=(window.innerHeight-r.height-4)+'px';
}

api.onInitNote((data)=>{
  noteData=data;
  document.getElementById('textarea').value=data.text||'';
  document.getElementById('opacity-slider').value=Math.round((data.opacity||1)*100);
  applyMinimized(data.minimized);
  applyColor(data.colorIdx||0);
  buildColorPicker();
  updateHeader();
});

(function setupDrag(){
  const header = document.getElementById('header');
  let dragging = false;
  let lastX = 0, lastY = 0;
  const canDrag = (e) => {
    if (!noteData) return false;
    if (e.button !== 0) return false;
    return !e.target.closest('.hbtn') && !e.target.closest('#color-indicator') && !e.target.closest('.color-picker') && !e.target.closest('.opacity-bar') && !e.target.closest('.ctx-menu');
  };
  header.addEventListener('mousedown', (e)=>{
    if (!canDrag(e)) return;
    dragging = true;
    lastX = e.screenX;
    lastY = e.screenY;
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e)=>{
    if (!dragging || !noteData) return;
    const dx = e.screenX - lastX;
    const dy = e.screenY - lastY;
    if (dx === 0 && dy === 0) return;
    api.noteDrag(noteData.id, dx, dy);
    lastX = e.screenX;
    lastY = e.screenY;
  });
  document.addEventListener('mouseup', ()=>{ dragging = false; });
  header.addEventListener('dblclick', (e)=>{
    if (e.target.closest('.hbtn') || e.target.closest('#color-indicator')) return;
    if (noteData) api.noteMinimize(noteData.id);
  });
})();
api.onNoteMinState((p)=>{if(!noteData||p.id!==noteData.id)return;noteData.minimized=p.minimized;applyMinimized(p.minimized);});

let saveTimer=null;
document.getElementById('textarea').addEventListener('input',(e)=>{
  if(!noteData)return;
  noteData.text=e.target.value;
  updateHeader();
  const ss=document.getElementById('save-state');
  ss.innerHTML='<span class="save-dot saving"></span>保存中…';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    api.noteUpdate(noteData.id,{text:noteData.text});
    document.getElementById('save-state').innerHTML='<span class="save-dot"></span>已保存';
  },220);
});

document.getElementById('btn-close').addEventListener('click',(e)=>{e.stopPropagation();if(noteData)api.noteClose(noteData.id);});
document.getElementById('btn-min').addEventListener('click',(e)=>{e.stopPropagation();if(noteData)api.noteMinimize(noteData.id);});
document.getElementById('btn-pin').addEventListener('click',(e)=>{e.stopPropagation();if(!noteData)return;noteData.alwaysOnTop=!noteData.alwaysOnTop;api.noteUpdate(noteData.id,{alwaysOnTop:noteData.alwaysOnTop});});
document.getElementById('btn-opacity').addEventListener('click',(e)=>{e.stopPropagation();closeAllPopups();document.getElementById('opacity-bar').classList.toggle('show');});

document.getElementById('color-indicator').addEventListener('click',(e)=>{
  e.stopPropagation();closeAllPopups();document.getElementById('color-picker').classList.toggle('show');
});
document.getElementById('color-indicator').addEventListener('contextmenu',(e)=>{
  e.preventDefault();e.stopPropagation();showContextMenu(e.clientX,e.clientY);
});

document.getElementById('opacity-slider').addEventListener('input',(e)=>{
  if(!noteData)return;api.noteUpdate(noteData.id,{opacity:parseInt(e.target.value,10)/100});
});

document.getElementById('header').addEventListener('contextmenu',(e)=>{
  if(e.target.closest('.hbtn')||e.target.closest('#color-indicator'))return;
  e.preventDefault();e.stopPropagation();showContextMenu(e.clientX,e.clientY);
});
document.getElementById('textarea').addEventListener('contextmenu',(e)=>{
  e.preventDefault();e.stopPropagation();showContextMenu(e.clientX,e.clientY);
});

document.addEventListener('click',(e)=>{
  if(!e.target.closest('.color-picker')&&!e.target.closest('#color-indicator'))
    document.getElementById('color-picker').classList.remove('show');
  if(!e.target.closest('.opacity-bar')&&!e.target.closest('#btn-opacity'))
    document.getElementById('opacity-bar').classList.remove('show');
  const ctx=document.getElementById('ctx-menu');
  if(ctx&&!e.target.closest('#ctx-menu'))ctx.remove();
});

document.addEventListener('keydown',(e)=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='m'){e.preventDefault();if(noteData)api.noteMinimize(noteData.id);}
  if(e.key==='Escape')closeAllPopups();
});
</script>
</body>
</html>
